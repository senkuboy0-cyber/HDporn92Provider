name: Build & Deploy CloudStream Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.13

      - name: Build Extensions
        run: |
          for i in 1 2 3; do
            gradle make && break || sleep 30
          done

      - name: Prepare builds folder
        run: |
          mkdir -p builds
          cat > builds/repo.json << 'JSON'
          {
            "name": "HDporn92 Provider",
            "description": "HDporn92 - Free Premium Porn Videos",
            "manifestVersion": 1,
            "pluginLists": [
              "https://raw.githubusercontent.com/senkuboy0-cyber/HDporn92Provider/builds/plugins.json"
            ]
          }
          JSON
          cp HDporn92Provider/build/HDporn92Provider.cs3 builds/
          cat > builds/plugins.json << 'JSON'
          [
            {
              "url": "https://raw.githubusercontent.com/senkuboy0-cyber/HDporn92Provider/builds/HDporn92Provider.cs3",
              "internalName": "HDporn92Provider",
              "tvTypes": ["Movie", "TvSeries", "Others"],
              "language": "en",
              "name": "HDporn92",
              "authors": ["senkuboy0-cyber"],
              "version": 1,
              "description": "HDporn92 - Free Premium Porn Videos",
              "repositoryUrl": "https://github.com/senkuboy0-cyber/HDporn92Provider",
              "status": 1
            }
          ]
          JSON

      - name: Deploy to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: builds
          clean: true
